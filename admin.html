<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>CraftedPixels Admin Portal</title>
    <link rel="icon" href="./images/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body class="admin-page">
    <main class="admin-shell">
      <section class="admin-login" data-admin-login>
        <img src="./images/logo.png" alt="CraftedPixels" class="admin-logo">
        <h1>Admin Portal</h1>
        <p>Login to view package inquiries.</p>
        <form data-login-form>
          <label>Username<input type="text" name="username" required></label>
          <label>Password<input type="password" name="password" required></label>
          <button class="btn btn-primary" type="submit">Login</button>
          <p class="form-status" role="status"></p>
        </form>
      </section>

      <section class="admin-dashboard" data-admin-dashboard hidden>
        <div class="admin-topbar">
          <div>
            <p class="kicker">CraftedPixels</p>
            <h1>Customer Inquiries</h1>
          </div>
          <div class="admin-actions">
            <button class="btn btn-secondary" type="button" data-clear-all>Clear All</button>
            <button class="btn btn-primary" type="button" data-logout>Logout</button>
          </div>
        </div>
        <div class="inquiries-list" data-inquiries-list></div>
      </section>
    </main>

    <script>
      const loginPanel = document.querySelector("[data-admin-login]");
      const dashboard = document.querySelector("[data-admin-dashboard]");
      const loginForm = document.querySelector("[data-login-form]");
      const list = document.querySelector("[data-inquiries-list]");
      const key = "craftedpixelsInquiries";

      const getItems = () => JSON.parse(localStorage.getItem(key) || "[]");
      const setItems = (items) => localStorage.setItem(key, JSON.stringify(items));

      function showDashboard() {
        loginPanel.hidden = true;
        dashboard.hidden = false;
        renderInquiries();
      }

      function renderInquiries() {
        const items = getItems();
        if (!items.length) {
          list.innerHTML = '<div class="empty-card">No inquiries yet.</div>';
          return;
        }
        list.innerHTML = items.map((item) => `
          <article class="inquiry-card">
            <div>
              <h2>${item.name || "No name"}</h2>
              <small>${item.date || ""}</small>
            </div>
            <p><b>Email:</b> ${item.email || ""}</p>
            <p><b>WhatsApp:</b> ${item.whatsapp || ""}</p>
            <p><b>Package:</b> ${item.package || ""}</p>
            <p><b>SKU:</b> ${item.sku || ""}</p>
            <p><b>Message:</b> ${item.message || ""}</p>
            <button class="btn btn-secondary" type="button" data-delete="${item.id}">Delete</button>
          </article>
        `).join("");
      }

      loginForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const status = loginForm.querySelector(".form-status");
        if (loginForm.username.value === "admin" && loginForm.password.value === "admin123") {
          sessionStorage.setItem("craftedpixelsAdmin", "yes");
          showDashboard();
        } else {
          status.textContent = "Invalid username or password.";
        }
      });

      list.addEventListener("click", (event) => {
        const button = event.target.closest("[data-delete]");
        if (!button) return;
        setItems(getItems().filter((item) => String(item.id) !== button.dataset.delete));
        renderInquiries();
      });

      document.querySelector("[data-clear-all]").addEventListener("click", () => {
        if (!confirm("Clear all inquiries?")) return;
        setItems([]);
        renderInquiries();
      });

      document.querySelector("[data-logout]").addEventListener("click", () => {
        sessionStorage.removeItem("craftedpixelsAdmin");
        dashboard.hidden = true;
        loginPanel.hidden = false;
        loginForm.reset();
      });

      if (sessionStorage.getItem("craftedpixelsAdmin") === "yes") showDashboard();
    </script>
  </body>
</html>
